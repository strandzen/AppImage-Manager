name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git base-devel cmake ninja extra-cmake-modules \
            qt6-base qt6-declarative qt6-svg qt6-tools \
            kcoreaddons ki18n kio knotifications kdbusaddons \
            kstatusnotifieritem kirigami kirigami-addons \
            libappimage libcanberra appstream dbus

      - uses: actions/checkout@v4

      - name: Build & test
        run: |
          # Provide a session bus so D-Bus calls don't abort in the container.
          # Provide a home dir for KSharedConfig and XDG_RUNTIME_DIR for Qt.
          export HOME=/root
          export XDG_RUNTIME_DIR=/tmp/runtime-root
          mkdir -p "$XDG_RUNTIME_DIR"
          chmod 0700 "$XDG_RUNTIME_DIR"
          dbus-run-session -- bash data/ci/test.sh

      - name: Validate metainfo
        run: appstreamcli validate --pedantic data/appimagemanager.metainfo.xml
